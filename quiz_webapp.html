<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>أسئلة المحاضرة</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');

  :root {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --surface2:  #222536;
    --border:    #2e3350;
    --accent:    #4f8ef7;
    --accent2:   #7c5cbf;
    --success:   #2dd4a0;
    --error:     #f7546a;
    --text:      #e8eaf6;
    --text2:     #8b90b8;
    --radius:    14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Header ─── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px;
  }
  .header-icon { font-size: 22px; }
  .header-info { flex: 1; }
  .header-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .header-sub   { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* ─── Progress bar ─── */
  .progress-wrap {
    padding: 12px 18px 0;
  }
  .progress-info {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--text2); margin-bottom: 6px;
  }
  .progress-track {
    height: 4px; background: var(--border); border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  /* ─── Question card ─── */
  .card-wrap { padding: 16px 14px 120px; }

  .q-number {
    font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
    color: var(--accent); text-transform: uppercase; margin-bottom: 10px;
  }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    line-height: 1.75;
    font-size: 15px;
  }

  /* ─── Options ─── */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    display: flex; align-items: flex-start; gap: 12px;
    transition: all 0.18s ease;
    font-size: 14px;
    line-height: 1.6;
    position: relative;
    overflow: hidden;
  }
  .option::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.18s;
  }
  .option:active::before { opacity: 0.06; }

  .option-letter {
    min-width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--text2);
    transition: all 0.18s;
    flex-shrink: 0;
  }
  .option-text { flex: 1; padding-top: 4px; }

  .option.selected {
    border-color: var(--accent);
    background: rgba(79,142,247,0.08);
  }
  .option.selected .option-letter {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .option.correct {
    border-color: var(--success);
    background: rgba(45,212,160,0.08);
  }
  .option.correct .option-letter {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }

  .option.wrong {
    border-color: var(--error);
    background: rgba(247,84,106,0.08);
  }
  .option.wrong .option-letter {
    background: var(--error);
    border-color: var(--error);
    color: #fff;
  }

  .option.disabled { pointer-events: none; }

  /* ─── Feedback badge ─── */
  .feedback {
    display: none;
    align-items: center; gap: 8px;
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px; font-weight: 500;
  }
  .feedback.show { display: flex; }
  .feedback.correct-fb { background: rgba(45,212,160,0.12); color: var(--success); border: 1px solid rgba(45,212,160,0.25); }
  .feedback.wrong-fb   { background: rgba(247,84,106,0.12); color: var(--error);   border: 1px solid rgba(247,84,106,0.25); }

  /* ─── Bottom bar ─── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; gap: 10px;
  }

  .btn {
    flex: 1; padding: 14px;
    border: none; border-radius: var(--radius);
    font-family: inherit; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.18s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff;
  }
  .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.4; pointer-events: none; }

  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text2);
    flex: 0 0 auto; width: 50px;
    font-size: 20px;
  }
  .btn-outline:active { background: var(--surface2); }

  /* ─── Summary screen ─── */
  .summary {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 120px;
    text-align: center;
  }
  .summary.show { display: flex; }

  .summary-ring {
    width: 130px; height: 130px;
    border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin-bottom: 24px;
    position: relative;
  }
  .summary-ring svg {
    position: absolute; inset: 0;
    transform: rotate(-90deg);
  }
  .summary-ring circle {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
  }
  .ring-track  { stroke: var(--border); }
  .ring-fill   { stroke: url(#ringGrad); transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1); }
  .summary-pct { font-size: 34px; font-weight: 700; color: var(--text); }
  .summary-lbl { font-size: 12px; color: var(--text2); }

  .summary-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .summary-sub   { font-size: 14px; color: var(--text2); margin-bottom: 28px; line-height: 1.6; }

  .stats-row {
    display: flex; gap: 12px; width: 100%; margin-bottom: 28px;
  }
  .stat-box {
    flex: 1; padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .stat-num  { font-size: 28px; font-weight: 700; }
  .stat-desc { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .stat-box.s-correct .stat-num { color: var(--success); }
  .stat-box.s-wrong   .stat-num { color: var(--error); }

  /* ─── Loading ─── */
  .loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; gap: 16px;
    font-size: 14px; color: var(--text2);
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; gap: 12px; padding: 24px;
    text-align: center;
  }
  .error-icon { font-size: 48px; }
  .error-title { font-size: 18px; font-weight: 600; }
  .error-msg   { font-size: 13px; color: var(--text2); line-height: 1.6; }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <span>جاري تحميل الأسئلة...</span>
</div>

<!-- Error -->
<div class="error-state" id="errorState" style="display:none">
  <div class="error-icon">⚠️</div>
  <div class="error-title">تعذّر التحميل</div>
  <div class="error-msg" id="errorMsg">حدث خطأ أثناء تحميل الأسئلة</div>
</div>

<!-- Quiz UI -->
<div id="quizUI" style="display:none">
  <div class="header">
    <div class="header-icon">📖</div>
    <div class="header-info">
      <div class="header-title" id="headerTitle">المحاضرة</div>
      <div class="header-sub"  id="headerSub">أسئلة طويلة</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-info">
      <span id="progressText">السؤال 1 من 1</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="card-wrap" id="cardWrap">
    <div class="q-number" id="qNumber">السؤال ١</div>
    <div class="q-card"   id="qText"></div>
    <div class="options"  id="optionsWrap"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="bottom-bar">
    <button class="btn btn-outline" id="btnBack" onclick="goBack()">‹</button>
    <button class="btn btn-primary" id="btnNext" disabled onclick="handleNext()">اختر إجابة</button>
  </div>
</div>

<!-- Summary -->
<div class="summary" id="summaryScreen">
  <div class="summary-ring">
    <svg viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#7c5cbf"/>
          <stop offset="100%" stop-color="#4f8ef7"/>
        </linearGradient>
      </defs>
      <circle class="ring-track" cx="65" cy="65" r="56"/>
      <circle class="ring-fill"  cx="65" cy="65" r="56" id="ringCircle"
        stroke-dasharray="351.86" stroke-dashoffset="351.86"/>
    </svg>
    <div class="summary-pct" id="summaryPct">0%</div>
    <div class="summary-lbl">النتيجة</div>
  </div>

  <div class="summary-title" id="summaryTitle">أحسنت!</div>
  <div class="summary-sub"   id="summarySub"></div>

  <div class="stats-row">
    <div class="stat-box s-correct">
      <div class="stat-num" id="statCorrect">0</div>
      <div class="stat-desc">✅ صحيح</div>
    </div>
    <div class="stat-box s-wrong">
      <div class="stat-num" id="statWrong">0</div>
      <div class="stat-desc">❌ خطأ</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-desc">📝 المجموع</div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="btn btn-primary" onclick="sendResults()">إرسال النتائج للبوت ✓</button>
  </div>
</div>

<script>
// ─── Telegram Web App Init ───────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0f1117');
  tg.setBackgroundColor('#0f1117');
}

// ─── State ───────────────────────────────────────────────────────────
let questions   = [];
let current     = 0;
let answers     = [];   // {selected, correct}
let answered    = false;
let lectureName = '';
let subjectName = '';

const LETTERS = ['A','B','C','D','E','F'];

// ─── Boot ────────────────────────────────────────────────────────────
(async function boot() {
  try {
    // البيانات تأتي من initData أو URL hash
    const params = parseParams();
    if (!params) return showError('لم يتم استلام بيانات الأسئلة. افتح هذه الصفحة من خلال البوت.');

    const mcqs = params.questions;
    if (!Array.isArray(mcqs) || mcqs.length === 0)
      return showError('لا توجد أسئلة طويلة في هذه المحاضرة.');

    questions   = mcqs;
    lectureName = params.lectureName || 'المحاضرة';
    subjectName = params.subjectName || '';

    document.getElementById('headerTitle').textContent = lectureName;
    document.getElementById('headerSub').textContent   = subjectName || 'أسئلة طويلة';

    hide('loading');
    show('quizUI');
    renderQuestion(0);
  } catch (e) {
    showError('خطأ في تحميل الأسئلة: ' + e.message);
  }
})();

// ─── Parse params from URL hash ──────────────────────────────────────
function parseParams() {
  try {
    // البيانات تُمرَّر عبر URL hash مشفرة بـ base64
    const hash = window.location.hash.slice(1);
    if (!hash) return null;
    const json = decodeURIComponent(atob(hash));
    return JSON.parse(json);
  } catch {
    return null;
  }
}

// ─── Render question ─────────────────────────────────────────────────
function renderQuestion(idx) {
  current  = idx;
  answered = false;
  const q  = questions[idx];
  const total = questions.length;

  // Progress
  const pct = Math.round((idx / total) * 100);
  document.getElementById('progressText').textContent = `السؤال ${idx + 1} من ${total}`;
  document.getElementById('progressPct').textContent  = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  document.getElementById('qNumber').textContent = `السؤال ${toArabicNum(idx + 1)}`;
  document.getElementById('qText').textContent   = q.question;

  // Feedback reset
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  // Options
  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.dataset.idx = i;
    div.innerHTML = `
      <div class="option-letter">${LETTERS[i]}</div>
      <div class="option-text">${opt}</div>`;
    div.addEventListener('click', () => selectOption(i));
    wrap.appendChild(div);
  });

  // Buttons
  const btnNext = document.getElementById('btnNext');
  btnNext.textContent = 'اختر إجابة';
  btnNext.disabled = true;
  document.getElementById('btnBack').style.display = idx > 0 ? '' : 'none';
}

// ─── Option selection ────────────────────────────────────────────────
function selectOption(idx) {
  if (answered) return;
  document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
  const el = document.querySelector(`.option[data-idx="${idx}"]`);
  if (el) el.classList.add('selected');

  const btnNext = document.getElementById('btnNext');
  btnNext.textContent = 'تأكيد الإجابة';
  btnNext.disabled = false;
  btnNext.dataset.pending = idx;
}

// ─── Confirm / Next ──────────────────────────────────────────────────
function handleNext() {
  const btnNext = document.getElementById('btnNext');

  if (!answered) {
    // Confirm answer
    const selected = parseInt(btnNext.dataset.pending ?? '-1');
    if (selected === -1) return;
    submitAnswer(selected);
  } else {
    // Next question
    if (current + 1 < questions.length) {
      renderQuestion(current + 1);
    } else {
      showSummary();
    }
  }
}

function submitAnswer(selected) {
  answered = true;
  const q = questions[current];
  const correct = q.correctOptionId;
  const isRight = selected === correct;

  answers.push({ selected, correct, isRight });

  // Color options
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.add('disabled');
    if (i === correct)  el.classList.add('correct');
    if (i === selected && !isRight) el.classList.add('wrong');
  });

  // Feedback
  const fb = document.getElementById('feedback');
  if (isRight) {
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = '✅  إجابة صحيحة!';
  } else {
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `❌  الإجابة الصحيحة: <b>${LETTERS[correct]}</b>`;
  }

  const btnNext = document.getElementById('btnNext');
  btnNext.disabled = false;
  btnNext.textContent = current + 1 < questions.length ? 'السؤال التالي  ›' : 'عرض النتيجة';
  if (tg) tg.HapticFeedback?.notificationOccurred(isRight ? 'success' : 'error');
}

// ─── Back ────────────────────────────────────────────────────────────
function goBack() {
  if (current > 0) renderQuestion(current - 1);
}

// ─── Summary ─────────────────────────────────────────────────────────
function showSummary() {
  hide('quizUI');
  const correct = answers.filter(a => a.isRight).length;
  const wrong   = answers.length - correct;
  const total   = answers.length;
  const pct     = total > 0 ? Math.round((correct / total) * 100) : 0;

  document.getElementById('summaryPct').textContent    = pct + '%';
  document.getElementById('statCorrect').textContent   = correct;
  document.getElementById('statWrong').textContent     = wrong;
  document.getElementById('statTotal').textContent     = total;
  document.getElementById('summarySub').textContent    =
    `${lectureName} — أجبت على ${total} سؤال`;

  const titles = pct === 100 ? 'ممتاز! 🎉' : pct >= 80 ? 'أحسنت! 👏' : pct >= 60 ? 'جيد 👍' : 'حاول مرة أخرى 💪';
  document.getElementById('summaryTitle').textContent = titles;

  // Ring animation
  const circ = 351.86;
  const offset = circ - (pct / 100) * circ;
  setTimeout(() => {
    document.getElementById('ringCircle').style.strokeDashoffset = offset;
  }, 100);

  const summaryEl = document.getElementById('summaryScreen');
  summaryEl.className = 'summary show';

  if (tg) tg.HapticFeedback?.notificationOccurred('success');
}

// ─── Send results back to bot ─────────────────────────────────────────
function sendResults() {
  const correct = answers.filter(a => a.isRight).length;
  const total   = answers.length;
  const pct     = total > 0 ? Math.round((correct / total) * 100) : 0;

  const data = JSON.stringify({
    type:       'webapp_quiz_result',
    lectureName,
    subjectName,
    total,
    correct,
    wrong:      total - correct,
    accuracy:   pct,
    answers:    answers.map(a => ({ s: a.selected, c: a.correct, ok: a.isRight }))
  });

  if (tg) {
    tg.sendData(data);
  } else {
    alert(`النتيجة: ${correct}/${total} (${pct}%)`);
  }
}

// ─── Helpers ─────────────────────────────────────────────────────────
function show(id) { document.getElementById(id).style.display = ''; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

function showError(msg) {
  hide('loading');
  hide('quizUI');
  document.getElementById('errorMsg').textContent = msg;
  show('errorState');
}

function toArabicNum(n) {
  return n.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}
</script>
</body>
</html>
