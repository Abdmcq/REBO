<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>أسئلة المحاضرة</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f8;--surface:#fff;--surface2:#f5f7fc;--border:#dde2f0;
  --accent:#3b6fd4;--accent-bg:rgba(59,111,212,0.08);
  --success:#16a34a;--success-bg:rgba(22,163,74,0.10);
  --error:#dc2626;--error-bg:rgba(220,38,38,0.10);
  --text:#1a1d2e;--text2:#6b7280;
  --hbg:#3b6fd4;--htxt:#fff;
  --shadow:0 2px 12px rgba(0,0,0,0.07);--r:12px;
}
[data-theme="dark"]{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222536;--border:#2e3350;
  --accent:#4f8ef7;--accent-bg:rgba(79,142,247,0.10);
  --success:#2dd4a0;--success-bg:rgba(45,212,160,0.10);
  --error:#f7546a;--error-bg:rgba(247,84,106,0.10);
  --text:#e8eaf6;--text2:#8b90b8;
  --hbg:#1a1d27;--htxt:#e8eaf6;
  --shadow:0 2px 12px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}

/* topbar */
.topbar{background:var(--hbg);color:var(--htxt);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar-credit{font-size:12px;font-weight:600;opacity:.92}
.theme-btn{background:rgba(255,255,255,.18);border:none;border-radius:20px;padding:4px 12px;color:var(--htxt);font-size:12px;cursor:pointer;font-family:inherit;transition:background .2s}
.theme-btn:hover{background:rgba(255,255,255,.3)}

/* subheader */
.subheader{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;gap:10px}
.subheader-icon{font-size:18px}
.subheader-title{font-size:13px;font-weight:600}
.subheader-sub{font-size:11px;color:var(--text2);margin-top:1px}

/* progress */
.pbar-wrap{padding:10px 16px 0}
.pbar-info{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px}
.pbar-track{height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#7c5cbf);border-radius:99px;transition:width .5s ease}

/* questions */
.qwrap{padding:12px 12px 140px;display:flex;flex-direction:column;gap:16px}

/* card */
.qcard{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);scroll-margin-top:130px}
.qhdr{padding:10px 14px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.qnum{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.qtext{font-size:14px;line-height:1.75;padding:12px 14px;color:var(--text)}
.opts{padding:0 10px 10px;display:flex;flex-direction:column;gap:7px}

/* option */
.opt{border:2px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;display:flex;align-items:flex-start;gap:9px;transition:border-color .15s,background .15s;font-size:13px;line-height:1.6;background:var(--surface2)}
.opt:hover:not(.disabled){border-color:var(--accent);background:var(--accent-bg)}
.oletter{min-width:24px;height:24px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;transition:background .15s,color .15s;color:var(--text2)}
.otext{flex:1;padding-top:2px}
.opt.correct{border-color:var(--success)!important;background:var(--success-bg)!important}
.opt.correct .oletter{background:var(--success);color:#fff}
.opt.wrong{border-color:var(--error)!important;background:var(--error-bg)!important}
.opt.wrong .oletter{background:var(--error);color:#fff}
.opt.disabled{pointer-events:none}

/* summary bar */
.sbar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:none;flex-direction:column;gap:8px;box-shadow:0 -4px 20px rgba(0,0,0,.1)}
.sbar.show{display:flex}
.stats{display:flex;gap:8px}
.stat{flex:1;padding:9px 6px;background:var(--surface2);border-radius:10px;text-align:center;border:1px solid var(--border)}
.snum{font-size:20px;font-weight:700}
.sdesc{font-size:10px;color:var(--text2);margin-top:1px}
.sc .snum{color:var(--success)}.sw .snum{color:var(--error)}.sp .snum{color:var(--accent)}
.sendbtn{padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .18s,transform .18s}
.sendbtn:active{opacity:.85;transform:scale(.98)}

/* loading/error */
.loading,.errs{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:12px;padding:24px;text-align:center}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading span{font-size:13px;color:var(--text2)}
.eicon{font-size:42px}.etitle{font-size:16px;font-weight:600}.emsg{font-size:12px;color:var(--text2);line-height:1.6;max-width:280px;white-space:pre-line}
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div class="topbar-credit">إعداد عبدالرحمن حسن</div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙 ليلي</button>
</div>

<div class="loading" id="loading"><div class="spinner"></div><span>جاري تحميل الأسئلة...</span></div>

<div class="errs" id="errState" style="display:none">
  <div class="eicon">⚠️</div>
  <div class="etitle">تعذّر التحميل</div>
  <div class="emsg" id="errMsg"></div>
</div>

<div id="quizUI" style="display:none">
  <div class="subheader">
    <div class="subheader-icon">📖</div>
    <div>
      <div class="subheader-title" id="hTitle">المحاضرة</div>
      <div class="subheader-sub"   id="hSub">أسئلة طويلة</div>
    </div>
  </div>
  <div class="pbar-wrap">
    <div class="pbar-info"><span id="pText">0 / 0 تمت الإجابة</span><span id="pPct">0%</span></div>
    <div class="pbar-track"><div class="pbar-fill" id="pFill" style="width:0%"></div></div>
  </div>
  <div class="qwrap" id="qwrap"></div>
</div>

<div class="sbar" id="sbar">
  <div class="stats">
    <div class="stat sc"><div class="snum" id="sC">0</div><div class="sdesc">✅ صحيح</div></div>
    <div class="stat sw"><div class="snum" id="sW">0</div><div class="sdesc">❌ خطأ</div></div>
    <div class="stat sp"><div class="snum" id="sP">0%</div><div class="sdesc">🎯 الدقة</div></div>
  </div>
  <button class="sendbtn" onclick="sendResults()">إرسال النتائج للبوت ✓</button>
</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

const LETTERS=['A','B','C','D','E','F'];
let questions=[],answers=[],answeredCount=0,lectureName='',subjectName='';
let isDark=false;

function toggleTheme(){
  isDark=!isDark;
  document.body.dataset.theme=isDark?'dark':'light';
  document.getElementById('themeBtn').textContent=isDark?'☀️ نهاري':'🌙 ليلي';
  if(tg){tg.setHeaderColor(isDark?'#1a1d27':'#3b6fd4');tg.setBackgroundColor(isDark?'#0f1117':'#f0f2f8');}
}

(async function boot(){
  try{
    const p=new URLSearchParams(window.location.search);
    const key=p.get('k'),apiUrl=p.get('api');
    if(!key||!apiUrl)return err('لم يتم استلام بيانات الأسئلة.
افتح هذه الصفحة من خلال البوت.');
    const res=await fetch(decodeURIComponent(apiUrl)+'/quiz?k='+encodeURIComponent(key));
    if(!res.ok){
      const e=await res.json().catch(()=>({}));
      return err(e.error==='session not found or expired'?'انتهت صلاحية الجلسة.
اطلب من البوت إرسال المحاضرة مجدداً.':'تعذّر تحميل الأسئلة.');
    }
    const d=await res.json();
    if(!Array.isArray(d.questions)||d.questions.length===0)return err('لا توجد أسئلة في هذه الجلسة.');
    questions=d.questions;
    lectureName=d.lectureName||'المحاضرة';
    subjectName=d.subjectName||'';
    answers=new Array(questions.length).fill(null);
    document.getElementById('hTitle').textContent=lectureName;
    document.getElementById('hSub').textContent=(subjectName?subjectName+' — ':'')+questions.length+' سؤال طويل';
    hide('loading');show('quizUI');
    render();updatePbar();
    if(tg){tg.setHeaderColor('#3b6fd4');tg.setBackgroundColor('#f0f2f8');}
  }catch(e){err('خطأ في الاتصال:
'+e.message);}
})();

function render(){
  const w=document.getElementById('qwrap');w.innerHTML='';
  questions.forEach((q,qi)=>{
    const card=document.createElement('div');
    card.className='qcard';card.id='qc'+qi;
    card.innerHTML=
      '<div class="qhdr"><span class="qnum">سؤال '+(qi+1)+'</span></div>'+
      '<div class="qtext">'+escH(q.question)+'</div>'+
      '<div class="opts" id="o'+qi+'"></div>';
    w.appendChild(card);
    const ow=document.getElementById('o'+qi);
    q.options.forEach((opt,oi)=>{
      const el=document.createElement('div');
      el.className='opt';el.dataset.qi=qi;el.dataset.oi=oi;
      el.innerHTML='<div class="oletter">'+LETTERS[oi]+'</div><div class="otext">'+escH(opt)+'</div>';
      el.addEventListener('click',()=>pick(qi,oi));
      ow.appendChild(el);
    });
  });
}

function pick(qi,oi){
  if(answers[qi]!==null)return;
  const correct=questions[qi].correctOptionId;
  const isRight=oi===correct;
  answers[qi]={selected:oi,correct,isRight};
  answeredCount++;
  const ow=document.getElementById('o'+qi);
  ow.querySelectorAll('.opt').forEach(el=>{
    el.classList.add('disabled');
    const idx=+el.dataset.oi;
    if(idx===correct)el.classList.add('correct');
    if(idx===oi&&!isRight)el.classList.add('wrong');
  });
  if(tg)tg.HapticFeedback?.notificationOccurred(isRight?'success':'error');
  updatePbar();
  // scroll to next unanswered
  const next=answers.findIndex((a,i)=>i>qi&&a===null);
  if(next!==-1){
    setTimeout(()=>{
      const nc=document.getElementById('qc'+next);
      if(nc)nc.scrollIntoView({behavior:'smooth',block:'start'});
    },380);
  } else {
    setTimeout(showSbar,450);
  }
}

function updatePbar(){
  const t=questions.length,pct=t?Math.round(answeredCount/t*100):0;
  document.getElementById('pText').textContent=answeredCount+' / '+t+' تمت الإجابة';
  document.getElementById('pPct').textContent=pct+'%';
  document.getElementById('pFill').style.width=pct+'%';
}

function showSbar(){
  const c=answers.filter(a=>a?.isRight).length;
  const w=answers.filter(a=>a&&!a.isRight).length;
  const t=answers.filter(a=>a).length;
  const p=t?Math.round(c/t*100):0;
  document.getElementById('sC').textContent=c;
  document.getElementById('sW').textContent=w;
  document.getElementById('sP').textContent=p+'%';
  document.getElementById('sbar').classList.add('show');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
}

function sendResults(){
  const c=answers.filter(a=>a?.isRight).length;
  const t=answers.filter(a=>a).length;
  const w=t-c,p=t?Math.round(c/t*100):0;
  const payload=JSON.stringify({
    type:'webapp_quiz_result',lectureName,subjectName,
    total:t,correct:c,wrong:w,accuracy:p,
    answers:answers.map(a=>a?{s:a.selected,c:a.correct,ok:a.isRight}:null)
  });
  if(tg&&tg.sendData){tg.sendData(payload);}
  else{
    try{navigator.clipboard.writeText(payload);}catch(e){}
    alert('النتيجة: '+c+'/'+t+' ('+p+'%)');
  }
}

function escH(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function show(id){document.getElementById(id).style.display='';}
function hide(id){document.getElementById(id).style.display='none';}
function err(msg){
  hide('loading');hide('quizUI');
  document.getElementById('errMsg').textContent=msg;
  show('errState');
}
</script>
</body>
</html>
